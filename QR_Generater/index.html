<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>09 QR Generator</title>
    <link rel="stylesheet" href="../QR_Generater/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  </head>

  <body>
    <!-- Theme Toggle (Top Right) -->
    <button id="themeToggle" class="toggle-btn">🌙</button>

    <!-- Center Title -->
    <h1 class="main-title">09 QR Generator</h1>

    <main class="card">
      <input type="text" id="qrText" placeholder="Enter text or URL" />

      <label class="file-label">
        <span>Upload Your Brand Logo (Optional)</span>
        <input type="file" id="logoInput" accept="image/*" />
      </label>

      <button id="generateBtn" class="btn">Generate QR</button>

      <div class="spinner" id="loadingSpinner"></div>

      <div id="qrOutput"></div>

      <a id="downloadBtn" download="qr.png" class="btn-secondary"
        >Download QR</a
      >

      <a href="../QR_Generater/decoder.html" class="switch-page"
        >Go to Decoder →</a
      >
    </main>

    <script src="../QR_Generater/script.js"></script>
  </body>
</html>
