<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#E23744" />
    <title>Profile — SH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/sh-shared.css" />
    <link rel="stylesheet" href="../profile/profile.css" />
  </head>
  <body>
    <div class="app">
      <div class="top-bar">
        <a href="../home/index.html" class="top-bar-back">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
        </a>
        <h2 class="top-bar-title">My Profile</h2>
        <div style="width: 36px"></div>
      </div>

      <div class="page-body">
        <div class="profile-hero">
          <div class="avatar-wrap">
            <div class="avatar" id="avatar">
              👤<img id="avatarImg" alt="" />
            </div>
            <label class="avatar-edit" for="photoInput">
              <svg viewBox="0 0 24 24">
                <path
                  d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                />
                <path
                  d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                />
              </svg>
            </label>
            <input
              type="file"
              id="photoInput"
              accept="image/*"
              style="display: none"
              onchange="handlePhoto(this)"
            />
          </div>
          <div class="upload-bar" id="uploadBar">
            <div class="upload-fill" id="uploadFill"></div>
          </div>
          <div class="profile-name" id="dispName">Your Name</div>
          <div class="profile-email" id="dispEmail">email@example.com</div>
          <div class="profile-stats">
            <div class="pstat">
              <div class="pstat-num" id="statOrders">0</div>
              <div class="pstat-label">Orders</div>
            </div>
            <div class="pstat">
              <div class="pstat-num">₹<span id="statSpent">0</span></div>
              <div class="pstat-label">Spent</div>
            </div>
            <div class="pstat">
              <div class="pstat-num">⭐<span id="statRating">4.8</span></div>
              <div class="pstat-label">Rating</div>
            </div>
          </div>
        </div>

        <form id="profileForm" onsubmit="saveProfile(event)">
          <div class="form-section">
            <div class="form-section-title">Personal Info</div>
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-input"
                id="fullName"
                placeholder="Your full name"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-input"
                id="email"
                placeholder="you@email.com"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input
                type="tel"
                class="form-input"
                id="phone"
                placeholder="+91 99999 99999"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Gender</label>
              <select class="form-input form-select" id="gender">
                <option value="">Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Delivery Address</label>
              <textarea
                class="form-input"
                id="address"
                placeholder="House no., Street, Landmark, City…"
                style="min-height: 80px; resize: none"
              ></textarea>
            </div>
          </div>

          <div class="form-section" style="padding-top: 0">
            <div class="form-section-title">Change Password</div>
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <div class="pass-wrap">
                <input
                  type="password"
                  class="form-input"
                  id="currPass"
                  placeholder="Current password"
                />
                <button
                  type="button"
                  class="pass-toggle"
                  onclick="toggleP('currPass')"
                >
                  <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <div class="pass-wrap">
                <input
                  type="password"
                  class="form-input"
                  id="newPass"
                  placeholder="New password"
                />
                <button
                  type="button"
                  class="pass-toggle"
                  onclick="toggleP('newPass')"
                >
                  <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="save-success" id="saveSuccess">
            ✓ Profile saved successfully!
          </div>
          <div style="padding: 10px 16px 0">
            <button type="submit" class="btn btn-red btn-full btn-lg">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="../home/index.html" class="nav-item"
        ><svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" /></svg
        ><span class="nav-label">Home</span></a
      >
      <a href="../orders/orders.html" class="nav-item"
        ><svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" /></svg
        ><span class="nav-label">Orders</span></a
      >
      <a href="index.html" class="nav-item active"
        ><svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" /></svg
        ><span class="nav-label">Profile</span></a
      >
      <a href="../settings/index.html" class="nav-item"
        ><svg class="nav-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
          /></svg
        ><span class="nav-label">Settings</span></a
      >
    </nav>

    <script src="../profile/profile.js"></script>
  </body>
</html>
